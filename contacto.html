<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Café</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">

</head>

<body>
    <header>
        <div class="imagen-fondo">
            <div class="contenedor-header">
                <div class="contenido-header">
                    <a class="logo" href="index.html">
                        <h1>Blogde<span class="resaltado">Café</span></h1>
                    </a>
                    <nav class="navegacion">
                        <a href="nosotros.html">Nosotros</a>
                        <a href="cursos.html">Cursos</a>
                        <a href="contacto.html">Contacto</a>
                    </nav>
                </div>
                <div class="hero">
                    <div class="contenido-hero">
                        <h2>Blog de café con consejos y cursos</h2>
                        <p>Aprende con expertos sobre el mundo del café</p>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="contenedor">
        <h2 class="alinear__texto">Contacto</h2>
        <div class="contacto-bg"> </div>
        <form class="formulario">
            <div class="campo">
                <label class="campo__label" for="nombre">Nombre:</label>
                <input class="campo__field" type="text" placeholder="Tu nombre" id="nombre">
            </div>
            <div class="campo">
                <label class="campo__label" for="email">Email:</label>
                <input class="campo__field" type="email" placeholder="Tu Email" id="email">
            </div>
            <div class="campo">
                <label class="campo__label" for="mensaje">Mensaje:</label>
                <textarea class="campo__field campo__field--textarea" id="mensaje"></textarea>
            </div>
            <div class="campo">
                <input type="submit" placeholder="Enviar" class="boton">
            </div>
        </form>

    </main>







    <footer class="footer">
        <div class="contenedor">
            <div>
                <a class="logo" href="index.html">
                    <h1>Blogde<span class="resaltado">Café</span></h1>
                </a>
            </div>
            <nav class="navegacion ">
                <a href="nosotros.html">Nosotros</a>
                <a href="cursos.html">Cursos</a>
                <a href="contacto.html">Contacto</a>
            </nav>
        </div>
    </footer>

</body>

</html>
